# AWS region and resources (set via environment or override here)
cloud.aws.region=us-east-1
app.s3.bucket=invoice-uploads
app.sns.topicArn=
app.sqs.queueUrl=
app.sqs.pollIntervalMs=10000

# Spring datasource - H2 for demo
spring.datasource.url=jdbc:h2:mem:invoicedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.org.springframework=INFO
logging.level.com.example.invoice=DEBUG

